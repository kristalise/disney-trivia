<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline - Disney Cruise Trivia</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #1e3a5f 0%, #2d5a87 100%);
      min-height: 100vh;
      padding: 20px;
      color: white;
    }
    .container {
      max-width: 480px;
      margin: 0 auto;
    }
    .header {
      text-align: center;
      margin-bottom: 24px;
      padding-top: 20px;
    }
    .icon { font-size: 56px; margin-bottom: 12px; }
    h1 { font-size: 22px; margin-bottom: 8px; }
    .subtitle {
      opacity: 0.85;
      font-size: 14px;
      line-height: 1.5;
    }
    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 24px;
    }
    .card {
      display: flex;
      align-items: center;
      gap: 10px;
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 14px;
      padding: 14px 12px;
      text-decoration: none;
      color: white;
      transition: background 0.2s;
    }
    .card:hover, .card:active {
      background: rgba(255,255,255,0.2);
    }
    .card-emoji { font-size: 24px; flex-shrink: 0; }
    .card-label { font-size: 13px; font-weight: 600; line-height: 1.3; }
    .footer {
      text-align: center;
      padding-bottom: 32px;
    }
    .retry-btn {
      background: rgba(255,255,255,0.15);
      color: white;
      border: 1px solid rgba(255,255,255,0.25);
      padding: 12px 24px;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
    }
    .retry-btn:hover { background: rgba(255,255,255,0.25); }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="icon">🚢</div>
      <h1>No worries!</h1>
      <p class="subtitle">You're offline, but these pages are saved on your device.</p>
    </div>

    <div class="grid">
      <a href="/planner" class="card">
        <span class="card-emoji">📋</span>
        <span class="card-label">Planner</span>
      </a>
      <a href="/quiz" class="card">
        <span class="card-emoji">🧠</span>
        <span class="card-label">Quiz</span>
      </a>
      <a href="/Secret-menU/cruise-guide" class="card">
        <span class="card-emoji">🗺️</span>
        <span class="card-label">Cruise Guide</span>
      </a>
      <a href="/Secret-menU/foodies" class="card">
        <span class="card-emoji">🍽️</span>
        <span class="card-label">Dining</span>
      </a>
      <a href="/Secret-menU/characters" class="card">
        <span class="card-emoji">🏰</span>
        <span class="card-label">Characters</span>
      </a>
      <a href="/Secret-menU/movies" class="card">
        <span class="card-emoji">🎬</span>
        <span class="card-label">Movies</span>
      </a>
      <a href="/Secret-menU/ships" class="card">
        <span class="card-emoji">⛵</span>
        <span class="card-label">Ships</span>
      </a>
      <a href="/Secret-menU/hacks" class="card">
        <span class="card-emoji">💡</span>
        <span class="card-label">Hacks</span>
      </a>
      <a href="/progress" class="card">
        <span class="card-emoji">📊</span>
        <span class="card-label">Progress</span>
      </a>
      <a href="/Secret-menU/things-to-do" class="card">
        <span class="card-emoji">🎉</span>
        <span class="card-label">Things to Do</span>
      </a>
    </div>

    <div class="footer">
      <button class="retry-btn" onclick="window.location.reload()">Try Again</button>
    </div>
  </div>
</body>
</html>
